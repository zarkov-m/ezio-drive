project_name: connector-onedrive

before:
  hooks:
    - cd scripts && go mod tidy
    - cd scripts && go test ./...

builds:
  - id: connector-onedrive
    main: ./scripts
    binary: connector-onedrive
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  use: github
